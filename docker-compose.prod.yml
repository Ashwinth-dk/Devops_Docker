# Production Override for Docker Compose
# 
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file overrides development settings with production-specific configurations

version: '3.8'

services:
  postgres:
    # Use persistent storage with backup
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=2GB"
      - "-c"
      - "maintenance_work_mem=128MB"
    environment:
      POSTGRES_INITDB_ARGS: "-c max_connections=300 -c shared_buffers=512MB"
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '2'
          memory: 1G

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    environment:
      NODE_ENV: production
      PORT: 5000
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 1G
        reservations:
          cpus: '2'
          memory: 512M
      replicas: 2  # Run 2 instances for load balancing
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    environment:
      NODE_ENV: production
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '1'
          memory: 256M
      replicas: 2  # Run 2 instances for load balancing
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
